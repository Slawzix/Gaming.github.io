<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crosshair Generator</title>

<style>

#equipped-crosshair {

    position: fixed;

    top: 50%;
    left: 50%;

    transform: translate(-50%, -50%);

    width: 200px;
    height: 200px;

    pointer-events: none;

    display: none;

    z-index: 99999;

}

.eline {

    position: absolute;

    background: #00ffcc;

}

.vertical {

    width: 6px;
    height: 60px;

    left: 97px;

}

.horizontal {

    width: 60px;
    height: 6px;

    top: 97px;

}

#etop {

    top: 20px;

}

#ebottom {

    bottom: 20px;

}

#eleft {

    left: 20px;

}

#eright {

    right: 20px;

}
    
button {

    margin: 10px;

    padding: 15px 25px;

    border: none;

    border-radius: 12px;

    background:
    linear-gradient(135deg,#7c3aed,#00c3ff);

    color: white;

    font-size: 18px;

    cursor: pointer;

}

button:hover {

    transform: scale(1.05);

}
    
body {

    margin: 0;
    background: #0f0f0f;
    color: white;
    font-family: Arial;
    text-align: center;

}

h1 {

    margin-top: 40px;
    font-size: 55px;

}

.controls {

    margin-top: 40px;

}

input {

    margin: 15px;
    width: 220px;

}

.crosshair-box {

    margin: 60px auto;

    width: 500px;
    height: 500px;

    background: #1a1a1a;

    border-radius: 20px;

    position: relative;

    overflow: hidden;

    border: 2px solid #7c3aed;

}

.line {

    position: absolute;
    background: #00ffcc;

}

#top {

    width: 6px;
    height: 60px;

    left: 247px;
    top: 140px;

}

#bottom {

    width: 6px;
    height: 60px;

    left: 247px;
    bottom: 140px;

}

#left {

    width: 60px;
    height: 6px;

    left: 140px;
    top: 247px;

}

#right {

    width: 60px;
    height: 6px;

    right: 140px;
    top: 247px;

}

.back {

    position: absolute;

    top: 20px;
    left: 20px;

    background: #222;

    color: white;

    padding: 12px 20px;

    text-decoration: none;

    border-radius: 10px;

}

.back:hover {

    background: #333;

}

</style>
</head>

<body>

<a class="back" href="index.html">
⬅ Back
</a>

<h1>✚ Crosshair Generator</h1>

<div class="controls">

    <p>Color</p>
    <input type="color" id="color">

    <p>Size</p>
    <input type="range" id="size" min="20" max="120" value="60">

    <p>Thickness</p>
    <input type="range" id="thickness" min="2" max="20" value="6">

<br><br>

<button onclick="saveCrosshair()">
    💾 Save Crosshair
</button>

<button onclick="toggleEquip()">
    🎮 Equip Crosshair
</button>
    
</div>

<div class="crosshair-box">

    <div class="line" id="top"></div>
    <div class="line" id="bottom"></div>
    <div class="line" id="left"></div>
    <div class="line" id="right"></div>

</div>

<div id="equipped-crosshair">

    <div class="eline vertical" id="etop"></div>
    <div class="eline vertical" id="ebottom"></div>

    <div class="eline horizontal" id="eleft"></div>
    <div class="eline horizontal" id="eright"></div>

</div>

  
<script>

const colorPicker =
document.getElementById("color");

const sizeSlider =
document.getElementById("size");

const thicknessSlider =
document.getElementById("thickness");

const lines =
document.querySelectorAll(".line");

function updateCrosshair() {

    const color =
    colorPicker.value;

    const size =
    sizeSlider.value;

    const thickness =
    thicknessSlider.value;

    lines.forEach(line => {

        line.style.background =
        color;

    });

    document.getElementById("top").style.height =
    size + "px";

    document.getElementById("bottom").style.height =
    size + "px";

    document.getElementById("left").style.width =
    size + "px";

    document.getElementById("right").style.width =
    size + "px";

    document.getElementById("top").style.width =
    thickness + "px";

    document.getElementById("bottom").style.width =
    thickness + "px";

    document.getElementById("left").style.height =
    thickness + "px";

    document.getElementById("right").style.height =
    thickness + "px";

}

colorPicker.addEventListener("input", updateCrosshair);

sizeSlider.addEventListener("input", updateCrosshair);

thicknessSlider.addEventListener("input", updateCrosshair);

updateCrosshair();

let equipped = false;

function saveCrosshair() {

    localStorage.setItem(
        "crosshairColor",
        colorPicker.value
    );

    localStorage.setItem(
        "crosshairSize",
        sizeSlider.value
    );

    localStorage.setItem(
        "crosshairThickness",
        thicknessSlider.value
    );

    alert("Crosshair Saved!");

}

function toggleEquip() {

    equipped = !equipped;

    const equippedCrosshair =
    document.getElementById(
        "equipped-crosshair"
    );

    if (equipped) {

        equippedCrosshair.style.display =
        "block";

        updateEquipped();

    }

    else {

        equippedCrosshair.style.display =
        "none";

    }

}

function updateEquipped() {

    const color =
    colorPicker.value;

    const size =
    sizeSlider.value;

    const thickness =
    thicknessSlider.value;

    const verticals =
    document.querySelectorAll(".vertical");

    const horizontals =
    document.querySelectorAll(".horizontal");

    document.querySelectorAll(".eline")
    .forEach(line => {

        line.style.background =
        color;

    });

    verticals.forEach(line => {

        line.style.height =
        size + "px";

        line.style.width =
        thickness + "px";

    });

    horizontals.forEach(line => {

        line.style.width =
        size + "px";

        line.style.height =
        thickness + "px";

    });

}

function loadCrosshair() {

    const savedColor =
    localStorage.getItem(
        "crosshairColor"
    );

    const savedSize =
    localStorage.getItem(
        "crosshairSize"
    );

    const savedThickness =
    localStorage.getItem(
        "crosshairThickness"
    );

    if (savedColor) {

        colorPicker.value =
        savedColor;

    }

    if (savedSize) {

        sizeSlider.value =
        savedSize;

    }

    if (savedThickness) {

        thicknessSlider.value =
        savedThickness;

    }

    updateCrosshair();

}

loadCrosshair();
    
</script>

</body>
</html>
