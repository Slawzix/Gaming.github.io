<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Name Generator</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: white;
            text-align: center;
            padding-top: 80px;
        }

        h1 {
            font-size: 55px;
        }

        p {
            color: #aaaaaa;
            font-size: 20px;
        }

        button {
            margin-top: 40px;
            padding: 18px 40px;
            font-size: 22px;
            border: none;
            border-radius: 14px;
            background: #7c3aed;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background: #9f67ff;
        }

        #name {
            margin-top: 50px;
            font-size: 50px;
            color: #00ffcc;
            font-weight: bold;
        }

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: white;
            background: #222;
            padding: 12px 20px;
            border-radius: 10px;
        }

        .back:hover {
            background: #333;
        }

    </style>
</head>

<body>

    <a class="back" href="index.html">
        ⬅ Back
    </a>

    <h1>🎯 Gamer Name Generator</h1>

    <p>
        Generate awesome gamer names instantly.
    </p>

    <button onclick="generateName()">
        Generate Name
    </button>

    <br>

<button onclick="copyName()">
    Copy Name
</button>

    <div id="name"></div>

  <script>

const first = [

"Shadow",
"Dark",
"Ghost",
"Nova",
"Blaze",
"Venom",
"Frost",
"Hyper",
"Silent",
"Void",
"Storm",
"Toxic",
"Reaper",
"Phantom",
"Night",
"Inferno",
"Zero",
"Cyber",
"Alpha",
"Omega",
"Rapid",
"Fatal",
"Crazy",
"Pixel",
"Thunder",
"Crystal",
"Dragon",
"Wolf",
"Sniper",
"Fire"

];

const second = [

"X",
"Shot",
"Hunter",
"Strike",
"Viper",
"ZX",
"Runner",
"Aim",
"Kill",
"Pulse",
"YT",
"FN",
"Ghost",
"Player",
"Gaming",
"Pro",
"Live",
"OnTop",
"Xx",
"77",
"999",
"TV",
"GG",
"Clan",
"FPS",
"Zone",
"Prime",
"Wave",
"Edge",
"King"

];

function generateName() {

    const randomFirst =
        first[Math.floor(Math.random() * first.length)];

    const randomSecond =
        second[Math.floor(Math.random() * second.length)];

    const finalName =
        randomFirst + randomSecond;

    document.getElementById("name").innerText =
        finalName;

}

function copyName() {

    const text =
        document.getElementById("name").innerText;

    navigator.clipboard.writeText(text);

    alert("Copied: " + text);

}

</script>
