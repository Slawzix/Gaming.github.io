<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Name Generator</title>

    <style>

        select {

    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    font-size: 18px;
    background: #222;
    color: white;

}

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: white;
            text-align: center;
            padding-top: 80px;
        }

        h1 {
            font-size: 55px;
        }

        p {
            color: #aaaaaa;
            font-size: 20px;
        }

        button {
            margin-top: 40px;
            padding: 18px 40px;
            font-size: 22px;
            border: none;
            border-radius: 14px;
            background: #7c3aed;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background: #9f67ff;
        }

        #name {
            margin-top: 50px;
            font-size: 50px;
            color: #00ffcc;
            font-weight: bold;
        }

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: white;
            background: #222;
            padding: 12px 20px;
            border-radius: 10px;
        }

        .back:hover {
            background: #333;
        }

    </style>
</head>

<body>

    <a class="back" href="index.html">
        ⬅ Back
    </a>

    <h1>🎯 Gamer Name Generator</h1>

    <br><br>

<select id="letter">

    <option value="">Any Letter</option>

    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
    <option value="D">D</option>
    <option value="E">E</option>
    <option value="F">F</option>
    <option value="G">G</option>
    <option value="H">H</option>
    <option value="I">I</option>
    <option value="J">J</option>
    <option value="K">K</option>
    <option value="L">L</option>
    <option value="M">M</option>
    <option value="N">N</option>
    <option value="O">O</option>
    <option value="P">P</option>
    <option value="Q">Q</option>
    <option value="R">R</option>
    <option value="S">S</option>
    <option value="T">T</option>
    <option value="U">U</option>
    <option value="V">V</option>
    <option value="W">W</option>
    <option value="X">X</option>
    <option value="Y">Y</option>
    <option value="Z">Z</option>

</select>

<br><br>

    <p>
        Generate awesome gamer names instantly.
    </p>

    <button onclick="generateName()">
        Generate Name
    </button>

    <br>

<button onclick="copyName()">
    Copy Name
</button>

    <div id="name"></div>

  <script>

const names = [

"Astro","Abyss","Ace","Alpha","Anarchy","Atomic","Apex","Arctic","Angel","Assault","Avenger","Arcade",

"Blaze","Bullet","Beast","Byte","Brawler","Blood","Breaker","Burn","Blade","Blast","Bounty","Brick",

"Cyber","Cryo","Clutch","Chaos","Crusher","Circuit","Core","Cobra","Carnage","Champion","Crash","Control",

"Dark","Dragon","Demon","Delta","Dagger","Danger","Drift","Dusk","Destroyer","Dream","Dynamo","Dread",

"Echo","Elite","Edge","Eternal","Ember","Error","Energy","Eclipse","Element","Emperor","Enigma","Evolution",

"Fatal","Frost","Flame","Flash","Fury","Fusion","Fear","Fighter","Falcon","Freeze","Force","Future",

"Ghost","Glitch","Galaxy","Gravity","Grinder","Gunner","Glow","Golem","Gladiator","Giga","Guardian","Genius",

"Hyper","Hunter","Havoc","Hex","Horizon","Hydra","Hazard","Hero","Hacker","Hellfire","Hammer","HunterX",

"Inferno","Ice","Impact","Ion","Illusion","Instinct","Ivory","Infinity","Invoker","Iron","Impulse","Iceberg",

"Joker","Jet","Jinx","Justice","Jaguar","Jammer","Jungle","Jester","Judgment","Javelin","JumpShot","Jade",

"Knight","Kraken","Karma","King","Killer","Kick","Knightmare","Krypton","Knockout","Katana","Kinetic","Kodiak",

"Legend","Laser","Lunar","Logic","Lightning","Limit","Legacy","Lock","Lethal","Lucid","Lava","Loop",

"Matrix","Mystic","Magma","Monster","Mirage","Mercury","Machine","Moon","Madness","Maverick","Metal","Midnight",

"Nova","Night","Neon","Nexus","Nitro","Nemesis","Ninja","Nuclear","Nightmare","Network","Noble","Neo",

"Omega","Onyx","Orbit","Overkill","Oblivion","Oracle","Origin","Outlaw","Overdrive","Oxide","Operator","Omen",

"Phantom","Pixel","Pulse","Prime","Predator","Psycho","Plasma","Phoenix","Power","Poison","PixelX","PulseFire",

"Quantum","Quick","Quasar","Quake","Quest","Quickshot","Queen","QuantumX","Quickscope","Quiver","Quantic","QuasarX",

"Rapid","Rogue","Reaper","Rift","Razor","Raven","Rage","Rocket","Revolt","Rampage","Ronin","Reflex",

"Shadow","Sniper","Storm","Strike","Savage","Skull","Smoke","Spectre","Shiver","Shock","Supreme","Slayer",

"Toxic","Thunder","Titan","Tempest","Turbo","Trigger","Tundra","Terror","TempestX","Thunderbolt","Tracker","Tactical",

"Ultra","Unity","Urban","Undead","Unknown","Upgrade","Universe","Uprising","UltraX","Umbra","Ultimate","Unreal",

"Venom","Vortex","Volt","Vision","Viper","Velocity","Virus","Void","Vandal","Virtual","Venator","Victory",

"Wolf","Wrath","Wild","Wave","Warrior","Wizard","Wicked","Winter","Warden","Warp","Wraith","Wildfire",

"Xeno","Xtreme","XShadow","Xplode","XenoCore","XShot","XenoWave","Xenon","XBlade","XHunter","XStorm","XVoid",

"Yeti","Yolo","Yurei","Yield","YoungBlood","Yakuza","Yellow","Yonder","Ymir","Yard","Yotta","Yokai",

"Zero","Zenith","Zombie","Zodiac","Zap","Zone","Zephyr","Zetta","Zoner","Zen","Zapper","ZBlade"

];

const endings = [

"X","FPS","YT","TV","Prime",
"Shot","Kill","Aim","Ghost",
"Wave","Clan","GG","Zone",
"777","999","Live","Pro",
"Gaming","OnTop","V2","HD",
"XD","TTV","RL","FN","GOAT",
"Skill","Elite","Master","Shadow",
"Void","Fire","Storm","Hunter",
"Plays","Core","Army","Empire",
"World","Bot","Tryhard","Killer",
"OneTap","zz","PvP","Edit",
"Cracked","Clips","God","Legend",
"Beam","Laser","Toxic","Sweat",
"VFX","OP","MVP","Nuke",
"Power","Prime","X","YT_",
"TV_","lol","xd","zzz"

];

function generateName() {

    const selectedLetter =
        document.getElementById("letter").value;

    let filtered = names;

    if (selectedLetter !== "") {

        filtered = names.filter(name =>
            name.startsWith(selectedLetter)
        );

    }

    if (filtered.length === 0) {

        document.getElementById("name").innerText =
            "No names found";

        return;

    }

    const randomFirst =
        filtered[Math.floor(Math.random() * filtered.length)];

    const randomSecond =
        endings[Math.floor(Math.random() * endings.length)];

    const finalName =
        randomFirst + randomSecond;

    document.getElementById("name").innerText =
        finalName;

}

function copyName() {

    const text =
        document.getElementById("name").innerText;

    navigator.clipboard.writeText(text);

    alert("Copied: " + text);

}

</script>
