<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aim Trainer</title>

<style>

    .layout {

    display: flex;

    justify-content: center;

    align-items: flex-start;

    gap: 40px;

    margin-top: 30px;

}

#leaderboard {

    width: 280px;

    background:
    linear-gradient(135deg,#161616,#101010);

    border: 2px solid #7c3aed;

    border-radius: 20px;

    padding: 20px;

    box-shadow:
    0 0 20px #7c3aed55;

}

#leaderboard h2 {

    margin-top: 0;

    color: #00c3ff;

}

.score-entry {

    margin: 12px 0;

    padding: 10px;

    border-radius: 10px;

    background: rgba(255,255,255,0.05);

}
.settings {

    margin-top: 20px;

}

#timeSelect {

    padding: 12px 20px;

    border: none;

    border-radius: 10px;

    background: #1f1f1f;

    color: white;

    font-size: 18px;

}

#game-area {

    position: relative;

    width: 1000px;
    height: 500px;

    margin: 40px auto;

    background:
    linear-gradient(135deg,#151515,#0f0f0f);

    border: 3px solid #7c3aed;

    border-radius: 25px;

    overflow: hidden;

    box-shadow:
    0 0 30px #7c3aed55,
    inset 0 0 20px #000;

}
    
body {

    margin: 0;
    overflow-x: hidden;

    background: #0f0f0f;

    color: white;

    font-family: Arial;

    text-align: center;

}

h1 {

    margin-top: 20px;

    font-size: 50px;

}

#score {

    font-size: 30px;

    margin-top: 10px;

}

#timer {

    font-size: 28px;

    margin-top: 10px;

}

#game {

    position: relative;

    width: 100vw;
    height: 80vh;

}

.target {

    position: absolute;

    width: 80px;
    height: 80px;

    border-radius: 50%;

    background:
    radial-gradient(circle,#ff004c,#9900ff);

    cursor: pointer;

    transition: 0.05s;

    box-shadow:
    0 0 20px #ff00aa,
    0 0 40px #9900ff;
    
}

.target:hover {

    transform: scale(1.1);

}

button {

    padding: 15px 30px;

    border: none;

    border-radius: 12px;

    background:
    linear-gradient(135deg,#7c3aed,#00c3ff);

    color: white;

    font-size: 20px;

    cursor: pointer;

    margin-top: 20px;

}

.back {

    position: absolute;

    top: 20px;
    left: 20px;

    background: #222;

    color: white;

    padding: 12px 20px;

    text-decoration: none;

    border-radius: 10px;

}

</style>
</head>

<body>

<a class="back" href="fps-tools.html">
⬅ Back
</a>

<h1>🎯 Aim Trainer</h1>

<div id="score">
Score: 0
</div>

<div id="timer">
Time: 30
</div>

<button onclick="startGame()">
Start Game
</button>

<div class="settings">

<select id="timeSelect">

    <option value="10">10 Seconds</option>
    <option value="20">20 Seconds</option>
    <option value="30" selected>30 Seconds</option>
    <option value="45">45 Seconds</option>
    <option value="60">1 Minute</option>
    <option value="90">1m 30s</option>
    <option value="120">2 Minutes</option>

</select>

</div>

<div class="layout">

    <div id="game-area">

        <div class="target" id="target"></div>

    </div>

    <div id="leaderboard">

        <h2>🏆 Leaderboard</h2>

        <div id="scores"></div>

    </div>

</div>
<script>

const target =
document.getElementById("target");

const scoreText =
document.getElementById("score");

const timerText =
document.getElementById("timer");

let score = 0;

let time = 30;

let gameRunning = false;

function randomPosition() {

    const gameArea =
    document.getElementById("game-area");

    const areaWidth =
    gameArea.clientWidth;

    const areaHeight =
    gameArea.clientHeight;

    const x =
    Math.random() *
    (areaWidth - target.offsetWidth);

    const y =
    Math.random() *
    (areaHeight - target.offsetHeight);

    target.style.left =
    x + "px";

    target.style.top =
    y + "px";

}

target.addEventListener("click", () => {

    if (!gameRunning) return;

    score++;

    scoreText.innerHTML =
    "Score: " + score;

    const newSize =
    Math.max(30, 80 - (score * 0.5));

    target.style.width =
    newSize + "px";

    target.style.height =
    newSize + "px";

    randomPosition();

});

function startGame() {

    score = 0;

    gameRunning = true;

    target.style.width = "80px";
    target.style.height = "80px";

    const selectedTime =
    parseInt(
        document.getElementById("timeSelect").value
    );

    time = selectedTime;

    scoreText.innerHTML =
    "Score: 0";

    timerText.innerHTML =
    "Time: " + time;

    randomPosition();

    const countdown =
    setInterval(() => {

        time--;

        timerText.innerHTML =
        "Time: " + time;

        if (time <= 0) {

            clearInterval(countdown);

            gameRunning = false;

         alert(
    "Game Over! Score: " + score
);

saveScore(score, selectedTime);

updateLeaderboard();

        }

    }, 1000);

}

randomPosition();

 function saveScore(score, timeMode) {

    let scores =
    JSON.parse(
        localStorage.getItem("aimScores")
    ) || {};

    if (!scores[timeMode]) {

        scores[timeMode] = [];

    }

    scores[timeMode].push(score);

    scores[timeMode].sort((a,b) => b - a);

    scores[timeMode] =
    scores[timeMode].slice(0, 5);

    localStorage.setItem(
        "aimScores",
        JSON.stringify(scores)
    );

}

function updateLeaderboard() {

    const scoresDiv =
    document.getElementById("scores");

    const selectedTime =
    document.getElementById("timeSelect").value;

    let scores =
    JSON.parse(
        localStorage.getItem("aimScores")
    ) || {};

    const currentScores =
    scores[selectedTime] || [];

    scoresDiv.innerHTML = "";

    if (currentScores.length === 0) {

        scoresDiv.innerHTML =
        "<p>No scores yet</p>";

        return;

    }

    currentScores.forEach((score, index) => {

        scoresDiv.innerHTML += `
        <div class="score-entry">
            #${index + 1} — ${score} Hits
        </div>
        `;

    });

}

document.getElementById("timeSelect")
.addEventListener("change", updateLeaderboard);

updateLeaderboard();   
</script>

</body>
</html>
