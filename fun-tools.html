<style>

body {

    margin: 0;

}

h1 {

.tools {

.tool {

    width: 260px;

    padding: 35px;

    border-radius: 20px;

    background: #1a1a1a;

    border: 2px solid #ff00aa55;

    transition: 0.25s;

    box-shadow:
    0 0 20px #ff00aa22;

}

.tool:hover {

    transform:
    translateY(-10px)
    scale(1.03);

    box-shadow:
    0 0 30px #ff00aa,
    0 0 50px #9900ff55;

}

.tool h2 {

    margin-top: 10px;

}

.tool p {

    color: #aaa;

}

.tool a {

    display: inline-block;

    margin-top: 20px;

    padding: 12px 25px;

    border-radius: 10px;

    text-decoration: none;

    color: white;

    background:
    linear-gradient(135deg,#ff00aa,#9900ff);

}

.back {

    position: absolute;

    top: 20px;
    left: 20px;

    padding: 12px 20px;

    background: #222;

    color: white;

    text-decoration: none;

    border-radius: 10px;
